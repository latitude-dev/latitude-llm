# Dependabot version updates.
#
# `cooldown` enforces a minimum-release-age (in days) before Dependabot will
# open a PR for a fresh version — mirror of `.npmrc minimum-release-age` for
# the bot-driven update path, and our primary supply-chain defense for pip
# (uv has no native minimum-release-age flag).

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directories:
      - /packages/telemetry/python
      - /packages/platform/op-gepa/python
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
