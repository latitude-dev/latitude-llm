name: Build and Push Images

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging or production)"
        required: true
        type: string
      ref:
        description: "Git ref to build from"
        required: true
        type: string
      push:
        description: "Push images to registry"
        required: false
        type: boolean
        default: true
      aws-region:
        description: "AWS region"
        required: false
        type: string
        default: "eu-central-1"
    outputs:
      image_tag:
        description: "Image tag that was pushed (sha-<commit>)"
        value: ${{ jobs.metadata.outputs.image_tag }}
      registry:
        description: "Container registry URL"
        value: ${{ jobs.metadata.outputs.registry }}

permissions:
  contents: read
  packages: write

jobs:
  metadata:
    name: Compute image metadata
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry: ${{ steps.meta.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Compute image metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short=8 HEAD)
          OWNER=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "registry=ghcr.io/${OWNER}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: metadata
    environment:
      name: ${{ inputs.environment }}
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        service: [api, ingest, workers, web, migrations]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.service }}
          push: ${{ inputs.push }}
          tags: |
            ${{ needs.metadata.outputs.registry }}/latitude-${{ inputs.environment }}-${{ matrix.service }}:${{ needs.metadata.outputs.image_tag }}
            ${{ needs.metadata.outputs.registry }}/latitude-${{ inputs.environment }}-${{ matrix.service }}:latest
          build-args: |
            VITE_LAT_API_URL=${{ vars.VITE_LAT_API_URL }}
            VITE_LAT_WEB_URL=${{ vars.VITE_LAT_WEB_URL }}
          cache-from: |
            type=registry,ref=${{ needs.metadata.outputs.registry }}/latitude-${{ inputs.environment }}-${{ matrix.service }}:latest
            type=gha,scope=${{ inputs.environment }}-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ inputs.environment }}-${{ matrix.service }}
