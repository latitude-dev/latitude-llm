name: Create Production Deploy PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-deploy-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development
        uses: actions/checkout@v5
        with:
          ref: development
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Block if a deploy PR is already open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXISTING=$(gh pr list \
            --base main \
            --state open \
            --limit 100 \
            --json number,headRefName,url \
            --jq '[.[] | select(.headRefName | startswith("deploy/production-"))]')

          COUNT=$(echo "$EXISTING" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            URL=$(echo "$EXISTING" | jq -r '.[0].url')
            BRANCH=$(echo "$EXISTING" | jq -r '.[0].headRefName')
            echo "::error::A production deploy PR is already open: ${URL} (branch ${BRANCH}). Merge or close it before opening a new one."
            exit 1
          fi

      - name: Verify development is ahead of main
        run: |
          set -euo pipefail
          AHEAD=$(git rev-list --count origin/main..origin/development)
          if [ "$AHEAD" = "0" ]; then
            echo "::error::development has no commits beyond main; nothing to deploy."
            exit 1
          fi
          echo "development is ${AHEAD} commits ahead of main"

      - name: Create deploy branch
        id: branch
        run: |
          set -euo pipefail
          TIMESTAMP=$(TZ=Europe/Madrid date +%d-%m-%Y-%H-%M)
          BRANCH="deploy/production-${TIMESTAMP}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git checkout -B "$BRANCH" origin/development
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail

          COMMITS=$(git log --pretty=format:'- %h %s' origin/main..origin/development | head -50)

          BODY=$(cat <<EOF
          Promotes \`development\` to \`main\` to deploy to production.

          Triggered manually by @${GITHUB_ACTOR} via the **Create Production Deploy PR** workflow.

          ## Commits

          ${COMMITS}
          EOF
          )

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Deploy production — ${BRANCH#deploy/production-}" \
            --body "${BODY}"
