name: Python Telemetry CI

on:
  pull_request:
    branches:
      - staging
      - main
    paths:
      - packages/telemetry/python/**
  workflow_call:

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          cd packages/telemetry/python
          uv venv
          uv sync --all-extras --all-groups

      - name: Run Ruff linter
        run: |
          cd packages/telemetry/python
          uv run ruff check .

      - name: Run Ruff format check
        run: |
          cd packages/telemetry/python
          uv run ruff format --check .

      - name: Run Pyright type check
        run: |
          cd packages/telemetry/python
          # Only type-check src/; examples have optional deps and tests have acceptable type issues
          uv run pyright src/

      - name: Run tests
        run: |
          cd packages/telemetry/python
          # Skip instrument_test.py due to test infrastructure issue with exporter patching
          uv run pytest tests/ -x --ignore=tests/telemetry/instrument_test.py
