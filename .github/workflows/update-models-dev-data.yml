name: Update Models.dev Data

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-models-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update models.dev data
        run: pnpm --filter @domain/models update:models-dev

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet packages/domain/models/src/data/models.dev.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: update bundled models.dev data'
          title: 'chore: update bundled models.dev data'
          body: |
            Automated update of the bundled models.dev JSON data.

            Updates `packages/domain/models/src/data/models.dev.json`
            with the latest model information from the models.dev API.
          branch: chore/update-models-dev-data
          delete-branch: true
          labels: |
            chore
            dependencies
            automated
          draft: false
