name: Web Bundle Size

on:
  pull_request:
    branches:
      - main

jobs:
  web-bundle-size:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.production from example
        run: cp .env.example .env.production

      - name: Build web app
        run: pnpm turbo run build --filter @app/web

      - name: Enforce client bundle size limit
        run: pnpm --filter @app/web check:bundle-size
