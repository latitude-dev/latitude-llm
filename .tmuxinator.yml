name: latitude-v2
root: .

startup_window: editor

windows:
  - editor:
      layout: main-vertical
      panes:
        - 'if command -v nvim >/dev/null 2>&1; then nvim; else clear; fi'
  - infra:
      panes:
        - cp -f .env.example .env.development && docker compose up --menu=false
  - db:
      panes:
        - pnpm --filter @platform/db-postgres pg:studio
  - apps:
      layout: tiled
      panes:
        - pnpm --filter @app/api dev
        - pnpm --filter @app/ingest dev
        - pnpm --filter @app/web dev
        - pnpm --filter @app/workers dev
  - workflows:
      panes:
        - pnpm --filter @app/workflows dev
