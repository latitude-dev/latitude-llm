{{- if .Values.ingest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "latitude.fullname" . }}-ingest
  labels:
    {{- include "latitude.componentLabels" (merge (dict "componentName" "ingest") .) | nindent 4 }}
spec:
  type: {{ .Values.ingest.service.type }}
  ports:
    - port: {{ .Values.ingest.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.ingest.service.type "NodePort") .Values.ingest.service.nodePort }}
      nodePort: {{ .Values.ingest.service.nodePort }}
      {{- end }}
  selector:
    {{- include "latitude.selectorLabels" (merge (dict "componentName" "ingest") .) | nindent 4 }}
{{- end }}
