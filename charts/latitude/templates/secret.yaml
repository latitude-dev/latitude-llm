{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "latitude.fullname" . }}
  labels:
    {{- include "latitude.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Required
  LAT_DATABASE_URL: {{ required "secrets.databaseUrl is required (or set existingSecret)" .Values.secrets.databaseUrl | quote }}
  LAT_CLICKHOUSE_PASSWORD: {{ required "secrets.clickhousePassword is required (or set existingSecret)" .Values.secrets.clickhousePassword | quote }}
  LAT_REDIS_HOST: {{ required "secrets.redisHost is required (or set existingSecret)" .Values.secrets.redisHost | quote }}
  LAT_REDIS_PORT: {{ .Values.secrets.redisPort | quote }}
  LAT_API_KEY_ENCRYPTION_KEY: {{ required "secrets.apiKeyEncryptionKey is required (or set existingSecret)" .Values.secrets.apiKeyEncryptionKey | quote }}
  LAT_BETTER_AUTH_SECRET: {{ required "secrets.betterAuthSecret is required (or set existingSecret)" .Values.secrets.betterAuthSecret | quote }}

  {{- if .Values.secrets.weaviateApiKey }}
  LAT_WEAVIATE_API_KEY: {{ .Values.secrets.weaviateApiKey | quote }}
  {{- end }}

  # Email provider secrets
  {{- if .Values.secrets.mailgunApiKey }}
  LAT_MAILGUN_API_KEY: {{ .Values.secrets.mailgunApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.mailgunSmtpPass }}
  LAT_MAILGUN_SMTP_PASS: {{ .Values.secrets.mailgunSmtpPass | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPass }}
  LAT_SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  {{- end }}
  {{- if .Values.secrets.sendgridApiKey }}
  LAT_SENDGRID_API_KEY: {{ .Values.secrets.sendgridApiKey | quote }}
  {{- end }}

  # OAuth secrets
  {{- if .Values.secrets.googleClientSecret }}
  LAT_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.githubClientSecret }}
  LAT_GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  {{- end }}

  # Stripe
  {{- if .Values.secrets.stripeSecretKey }}
  LAT_STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  LAT_STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  {{- end }}
{{- end }}
