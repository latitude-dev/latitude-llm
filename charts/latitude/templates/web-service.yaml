{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "latitude.fullname" . }}-web
  labels:
    {{- include "latitude.componentLabels" (merge (dict "componentName" "web") .) | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.web.service.type "NodePort") .Values.web.service.nodePort }}
      nodePort: {{ .Values.web.service.nodePort }}
      {{- end }}
  selector:
    {{- include "latitude.selectorLabels" (merge (dict "componentName" "web") .) | nindent 4 }}
{{- end }}
