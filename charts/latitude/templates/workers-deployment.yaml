{{- if .Values.workers.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "latitude.fullname" . }}-workers
  labels:
    {{- include "latitude.componentLabels" (merge (dict "componentName" "workers") .) | nindent 4 }}
spec:
  replicas: {{ .Values.workers.replicaCount }}
  selector:
    matchLabels:
      {{- include "latitude.selectorLabels" (merge (dict "componentName" "workers") .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.workers.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "latitude.selectorLabels" (merge (dict "componentName" "workers") .) | nindent 8 }}
        {{- with .Values.workers.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "latitude.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Workers process background jobs; allow time for in-flight jobs to complete
      terminationGracePeriodSeconds: 60
      containers:
        - name: workers
          image: {{ include "latitude.image" (dict "component" .Values.workers "global" .Values.global "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.workers.healthPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "latitude.configmapName" . }}
            - secretRef:
                name: {{ include "latitude.secretName" . }}
          env:
            - name: LAT_WORKERS_HEALTH_PORT
              value: {{ .Values.workers.healthPort | quote }}
          {{- with .Values.workers.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workers.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workers.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.workers.resources | nindent 12 }}
      {{- with .Values.workers.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
