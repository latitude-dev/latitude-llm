services:
  postgres:
    image: postgres:16
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    command: postgres -c wal_level=logical

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.2
    command: ["--host", "0.0.0.0", "--port", "8099", "--scheme", "http"]
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - 8099:8099
      - 50051:50051
    volumes:
      - weaviate-data:/var/lib/weaviate

  redis:
    image: redis:7
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:v1.24
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "1025:1025"
      - "8025:8025"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.14
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/brokers || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.14
    depends_on:
      redpanda:
        condition: service_healthy
    command:
      - topic
      - create
      - domain-events
      - domain-events-dlq
      - span-ingestion
      - -X
      - brokers=redpanda:29092
      - --partitions=1
      - --replicas=1
    restart: "no"

volumes:
  postgres_data:
  clickhouse_data:
  weaviate-data:
  redpanda_data:
