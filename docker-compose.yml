services:
  postgres:
    image: postgres:16
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    command: postgres -c wal_level=logical

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.2
    command: ["--host", "0.0.0.0", "--port", "8099", "--scheme", "http"]
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - 8099:8099
      - 50051:50051
    volumes:
      - weaviate-data:/var/lib/weaviate

  redis:
    image: redis:7
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "6379:6379"

  redis-bullmq:
    image: redis:7
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "6380:6379"

  mailpit:
    image: axllent/mailpit:v1.24
    env_file:
      - .env.${NODE_ENV:-development}
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  clickhouse_data:
  weaviate-data:
