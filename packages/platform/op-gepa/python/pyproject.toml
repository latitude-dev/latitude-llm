[project]
name = "latitude-op-gepa"
version = "0.1.0"
description = "Latitude GEPA optimization runtime"
requires-python = ">=3.13, <3.14"
dependencies = [
    "gepa==0.0.27",
    "pydantic==2.12.5",
    "typing-extensions==4.15.0",
]

[dependency-groups]
dev = [
    "pytest-asyncio==1.3.0",
    "pytest-xdist==3.8.0",
    "pytest==9.0.3",
    "respx==0.23.1",
    "pyright==1.1.408",
    "ruff==0.15.9",
    "sh==2.2.2",
    "psutil==7.2.2",
]

[tool.uv]
# Refuse to resolve PyPI packages published less than 7 days ago.
# Mirrors `.npmrc minimum-release-age` on the JS side and buys time for
# malicious releases to be yanked before we pick them up (see the May 2026
# Mini Shai-Hulud campaign for why). Relative durations land a rolling cutoff
# — no need to bump a fixed date.
exclude-newer = "7d"

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"
reportMissingTypeStubs = false
reportUnnecessaryIsInstance = false
reportPrivateUsage = false
reportPrivateImportUsage = false

[tool.ruff]
target-version = "py313"
line-length = 120
indent-width = 4

[tool.ruff.lint]
select = ["B", "C4", "E", "F", "I", "W", "UP"]
ignore = [
    "F401",
    "F403",
    # Needed because unnecessary str() on field aliases are needed
    # https://docs.pydantic.dev/2.8/concepts/fields/#field-aliases
    "UP018",
    # Needed because typing.List and typing.Dict are semi-deprecated
    # in new Python versions but we want to maintain compatibility
    "UP006",
    "UP035",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
addopts = "-p no:warnings -n auto"
xfail_strict = true
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
