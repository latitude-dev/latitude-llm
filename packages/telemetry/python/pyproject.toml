[project]
name = "latitude-telemetry"
version = "3.0.0a5"
description = "Latitude Telemetry for Python"
authors = [{ name = "Latitude Data SL", email = "hello@latitude.so" }]
maintainers = [{ name = "Latitude Data SL", email = "hello@latitude.so" }]
readme = "README.md"
license = "MIT"
urls.repository = "https://github.com/latitude-dev/latitude-llm/tree/main/packages/telemetry/python"
urls.homepage = "https://github.com/latitude-dev/latitude-llm/tree/main/packages/telemetry/python#readme"
urls.documentation = "https://github.com/latitude-dev/latitude-llm/tree/main/packages/telemetry/python#readme"
requires-python = ">=3.11, <3.15"
dependencies = [
    "opentelemetry-api==1.38.0",
    "opentelemetry-sdk==1.38.0",
    "opentelemetry-exporter-otlp-proto-http==1.38.0",
    "opentelemetry-semantic-conventions-ai==0.4.13",
    "openinference-semantic-conventions==0.1.25",
    "opentelemetry-instrumentation-alephalpha==0.50.1",
    "opentelemetry-instrumentation-anthropic==0.50.1",
    "opentelemetry-instrumentation-bedrock==0.50.1",
    "opentelemetry-instrumentation-cohere==0.50.1",
    "opentelemetry-instrumentation-crewai==0.50.1",
    "openinference-instrumentation-dspy==0.1.33",
    "opentelemetry-instrumentation-google-generativeai==0.50.1",
    "opentelemetry-instrumentation-groq==0.50.1",
    "opentelemetry-instrumentation-haystack==0.50.1",
    "opentelemetry-instrumentation-langchain==0.50.1",
    "openinference-instrumentation-litellm==0.1.6",
    "opentelemetry-instrumentation-llamaindex==0.50.1",
    "opentelemetry-instrumentation-mistralai==0.50.1",
    "opentelemetry-instrumentation-ollama==0.50.1",
    "opentelemetry-instrumentation-openai==0.50.1",
    "openinference-instrumentation-openai-agents==1.4.2",
    "opentelemetry-instrumentation-replicate==0.50.1",
    "opentelemetry-instrumentation-sagemaker==0.50.1",
    "opentelemetry-instrumentation-together==0.50.1",
    "opentelemetry-instrumentation-threading==0.59b0",
    "opentelemetry-instrumentation-transformers==0.50.1",
    "opentelemetry-instrumentation-vertexai==0.50.1",
    "opentelemetry-instrumentation-watsonx==0.50.1",
    "pydantic==2.12.5",
    "typing-extensions==4.15.0",
    "openai-agents==0.15.1",
]

[dependency-groups]
dev = [
    "pytest-asyncio==1.3.0",
    "pytest-xdist==3.8.0",
    "pytest==9.0.3",
    "pyright==1.1.408",
    "ruff==0.14.14",
    "sh==2.2.2",
    "openai==2.30.0",
    # Note: 0.41.0 onwards made Prompt Caching generally available
    # which is not compatible with the instrumentation
    "anthropic==0.40.0",
    "litellm[proxy]==1.83.7",
]

[tool.uv]
# Refuse to resolve PyPI packages published less than 7 days ago.
# Mirrors `.npmrc minimum-release-age` on the JS side and buys time for
# malicious releases to be yanked before we pick them up (see the May 2026
# Mini Shai-Hulud campaign for why). Relative durations land a rolling cutoff
# — no need to bump a fixed date.
exclude-newer = "7d"

[tool.pyright]
pythonVersion = "3.11"
# Point pyright at the uv-managed venv so editor LSPs (nvim, VS Code) resolve
# imports without needing the user to launch the editor from an activated shell.
venvPath = "."
venv = ".venv"
typeCheckingMode = "strict"
reportMissingTypeStubs = false
reportUnnecessaryIsInstance = false
reportPrivateUsage = false

[tool.ruff]
target-version = "py311"
line-length = 120
indent-width = 4

[tool.ruff.lint]
select = ["B", "C4", "E", "F", "I", "W", "UP"]
ignore = [
    "F401",
    "F403",
    # Needed because unnecessary str() on field aliases are needed
    # https://docs.pydantic.dev/2.8/concepts/fields/#field-aliases
    "UP018",
    # Needed because typing.List and typing.Dict are semi-deprecated
    # in new Python versions but we want to maintain compatibility
    "UP006",
    "UP035",
    "E402",  # We allow import not at top of file to not import every framework package
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
addopts = "-p no:warnings -n auto"
xfail_strict = true
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
